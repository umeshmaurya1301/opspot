services:
  mysql:
    image: mysql:8.0
    container_name: opspot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: opspot
      MYSQL_USER: opspot
      MYSQL_PASSWORD: opspot123
    volumes:
      - opspot_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "opspot", "-popspot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: opspot-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  opspot_mysql_data:
